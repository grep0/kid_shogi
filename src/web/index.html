<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dōbutsu Shōgi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>Dōbutsu Shōgi</h1>

    <div id="main">
    <div id="game-screen">
      <div id="status-bar"></div>

      <!-- Gote's captured pieces (top) -->
      <div id="hand-gote" class="hand hand-gote">
        <span class="hand-label">Gote's hand:</span>
        <div class="hand-pieces"></div>
      </div>

      <!-- 3×4 board -->
      <div id="board">
        <img id="board-bg" src="assets/board.svg" alt="">
        <!-- cells injected by JS, row 4 (top) first -->
      </div>

      <!-- Sente's captured pieces (bottom) -->
      <div id="hand-sente" class="hand hand-sente">
        <span class="hand-label">Sente's hand:</span>
        <div class="hand-pieces"></div>
      </div>

      <!-- Setup overlay: shown at start and after New Game -->
      <div id="setup-screen">
        <p>Play as:</p>
        <button id="btn-play-first">Sente</button>
        <button id="btn-play-second">Gote</button>
      </div>

      <button id="btn-new-game">New Game</button>
    </div>

    <div id="game-record">
      <div id="record-header">
        <span class="record-col-num">#</span>
        <span class="record-col-sente">Sente</span>
        <span class="record-col-gote">Gote</span>
      </div>
      <div id="record-list"></div>
    </div>

    </div><!-- #main -->
  </div>

  <script src="game.js"></script>
</body>
</html>
